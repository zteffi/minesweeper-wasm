<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>hello-wasm example</title>
    <style>
      #container {
       width: 440;
       margin: 50px;
      }

      .button {
        width: 30px;
        height: 30px;
        margin: 2px;
      }

      #resetBtn {
        margin: 0px 50px;
      }

    </style>
  </head>
  <body>
    <div id="container">
    </div>
    <script type="module">
          import init, { State } from "./pkg/minesweeper_wasm.js";
      init().then (() => {reset();});

      const StateIcon = ['🌞', '🚩', '❓']
      document.getElementById("resetBtn").onclick = reset;

      function reset() {
        const state = new State();
        const container = document.getElementById("container");
        container.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const line = document.createElement("div");
            line.classList.add("line");

          for (let j = 0; j < 10; j++) {
            const button = document.createElement("button");
            button.id = "field"+i+j;
            button.classList.add("button");
            button.setAttribute("state", 0);
            button.textContent = "🌞"

            button.onclick = function()  {
              const k = state.update(i,j);
              button.disabled = true;
              if (k < 0) {
                button.textContent = "💥";
              }
              else if (k == 0)
              {
                for (let ii = -1; ii < 2; ii++) {
                  for (let jj = -1; jj < 2; jj++) {
                      const neighbor = document.getElementById("field"+(i+ii)+(j+jj));
                      if (neighbor && !neighbor.disabled) {
                        neighbor.onclick();
                      }
                  }
                }
                button.textContent = "⬜";
              }
              else {
                button.textContent = ""+k;
              }
            }
            button.oncontextmenu = () => {
              const state = (Number(button.getAttribute("state")) + 1) % 3;
              button.setAttribute("state",  state);
              button.textContent  = StateIcon[state]
              return false;
            }
            line.appendChild(button);
          }
          container.appendChild(line);
        }
      }
    </script>
    <button id="resetBtn" >Reset</button>
  </body>
</html>
